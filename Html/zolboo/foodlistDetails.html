<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Details</title>
</head>
<body>
    <header>
        <!-- Recipe title -->
        <h1 id="recipe-title"></h1>
    </header>

    <main>
        <!-- Section for displaying -->
        <section id="recipe-details">
            <h2>Recipe Details</h2>
            <div>
                <p>Prep Time: <span id="prep-time"></span></p>
                <p>Cook Time: <span id="cook-time"></span></p>
                <p>Total Time: <span id="total-time"></span></p>
                <p>Servings: <span id="servings"></span></p>
            </div>
        </section>

        <!-- Ingredients list section -->
        <section id="ingredients-section">
            <h2>Ingredients</h2>
            <ul id="ingredients-list">
                <!-- Ingredients -->
            </ul>
        </section>

        <!-- Instructions section -->
        <section id="instructions-section">
            <h2>Instructions</h2>
            <ol id="instructions-list">
                <!-- Instructions -->
            </ol>
        </section>

        <!-- Nutritional Information section -->
        <section id="nutrition-section">
            <h2>Nutritional Information</h2>
            <div id="nutrition-info">
                <!-- Nutritional info -->
            </div>
        </section>

        <!-- Optional Tips section -->
        <section id="tips-section">
            <h2>Tips</h2>
            <p id="tips-text"></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 FoodCraft. All rights reserved.</p>
    </footer>
</body>
</html>
